name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          go build -ldflags "$LDFLAGS" -o build/worktime ./cmd/worktime

      - name: Create archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd build
          tar czf "worktime_${VERSION}_darwin_arm64.tar.gz" worktime

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/worktime_*.tar.gz
          generate_release_notes: true

