name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          go build -ldflags "$LDFLAGS" -o build/worktime ./cmd/worktime

      - name: Create archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd build
          tar czf "worktime_${VERSION}_darwin_arm64.tar.gz" worktime

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/worktime_*.tar.gz
          generate_release_notes: true

      - name: Update homebrew formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          ASSET_URL="https://github.com/Soarkey/worktime/releases/download/${TAG}/worktime_${VERSION}_darwin_arm64.tar.gz"
          SHA=$(curl -sL "$ASSET_URL" | shasum -a 256 | cut -d' ' -f1)

          gh repo clone Soarkey/worktime /tmp/repo
          cd /tmp/repo
          git checkout main

          sed -i "" "s|url \".*\"|url \"${ASSET_URL}\"|" homebrew/Formula/worktime.rb
          sed -i "" "s|sha256 \".*\"|sha256 \"${SHA}\"|" homebrew/Formula/worktime.rb

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/Soarkey/worktime.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add homebrew/Formula/worktime.rb
          git commit -m "worktime ${TAG}"
          git push
